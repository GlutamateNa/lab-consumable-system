<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>课题组公共耗材余量看板</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Microsoft YaHei", Arial, sans-serif;
    }

    body {
      background: #f4f8fc;
      color: #1f2d3d;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #0f4c81, #1b75bc);
      color: white;
      padding: 26px 42px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      box-shadow: 0 10px 28px rgba(15,76,129,0.18);
    }

    header h1 {
      font-size: 26px;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    header p {
      color: rgba(255,255,255,0.86);
      font-size: 14px;
    }

    .user-box {
      text-align: right;
      font-size: 14px;
      line-height: 1.8;
      white-space: nowrap;
    }

    .logout-btn {
      border: 1px solid rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.12);
      color: white;
      padding: 8px 14px;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 8px;
    }

    .logout-btn:hover {
      background: rgba(255,255,255,0.2);
    }

    main {
      width: min(1380px, 94vw);
      margin: 28px auto 50px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
      margin-bottom: 24px;
    }

    .summary-card {
      background: white;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 10px 26px rgba(30, 90, 150, 0.08);
      border: 1px solid #e4eef8;
    }

    .summary-card span {
      color: #6f8093;
      font-size: 14px;
    }

    .summary-card strong {
      display: block;
      font-size: 32px;
      color: #0f4c81;
      margin-top: 10px;
    }

    .toolbar {
      background: white;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 10px 26px rgba(30, 90, 150, 0.08);
      border: 1px solid #e4eef8;
      margin-bottom: 22px;
    }

    .toolbar-top {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 12px;
      margin-bottom: 16px;
    }

    .search-input {
      padding: 12px 14px;
      border: 1px solid #cfdceb;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
      background: #fbfdff;
    }

    .search-input:focus {
      border-color: #1b75bc;
      box-shadow: 0 0 0 3px rgba(27,117,188,0.12);
    }

    .btn {
      border: none;
      padding: 11px 16px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s;
      white-space: nowrap;
    }

    .btn-primary {
      background: #1b75bc;
      color: white;
    }

    .btn-secondary {
      background: #eef5fc;
      color: #0f4c81;
      border: 1px solid #d4e5f5;
    }

    .btn-danger {
      background: #fff0f0;
      color: #c0392b;
      border: 1px solid #ffd0d0;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .category-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .cat-btn {
      border: 1px solid #d4e5f5;
      background: #f6faff;
      color: #406080;
      padding: 10px 15px;
      border-radius: 999px;
      cursor: pointer;
      transition: 0.2s;
    }

    .cat-btn.active {
      background: #1b75bc;
      color: white;
      border-color: #1b75bc;
    }

    .table-card {
      background: white;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 10px 26px rgba(30, 90, 150, 0.08);
      border: 1px solid #e4eef8;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: #eef6ff;
    }

    th {
      text-align: left;
      padding: 16px 14px;
      color: #244a6b;
      font-size: 14px;
      border-bottom: 1px solid #dfeaf5;
      white-space: nowrap;
    }

    td {
      padding: 15px 14px;
      border-bottom: 1px solid #eef2f7;
      font-size: 14px;
      vertical-align: middle;
    }

    tr:hover {
      background: #fbfdff;
    }

    .category-label {
      display: inline-block;
      padding: 5px 9px;
      border-radius: 999px;
      background: #eef5fc;
      color: #0f4c81;
      font-size: 13px;
      white-space: nowrap;
    }

    .item-name {
      font-weight: 600;
      color: #22384d;
    }

    .badge {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 13px;
      white-space: nowrap;
    }

    .badge-ok {
      background: #e8f8ee;
      color: #207944;
      border: 1px solid #bfe8ce;
    }

    .badge-low {
      background: #fff7e6;
      color: #b66a00;
      border: 1px solid #ffe0a3;
    }

    .badge-empty {
      background: #fff0f0;
      color: #c0392b;
      border: 1px solid #ffd0d0;
    }

    .badge-restocking {
      background: #eaf4ff;
      color: #1b75bc;
      border: 1px solid #c8e2fb;
    }

    .badge-normal {
      background: #f1f3f5;
      color: #5d6d7e;
      border: 1px solid #dde3e8;
    }

    .qty-input {
      width: 90px;
      padding: 8px 9px;
      border: 1px solid #cfdceb;
      border-radius: 10px;
      outline: none;
    }

    .unit-input {
      width: 80px;
      padding: 8px 9px;
      border: 1px solid #cfdceb;
      border-radius: 10px;
      outline: none;
    }

    .checkbox {
      transform: scale(1.15);
      cursor: pointer;
    }

    .empty {
      text-align: center;
      padding: 42px;
      color: #7b8a9a;
    }

    .hint {
      margin-top: 14px;
      color: #738497;
      font-size: 13px;
      line-height: 1.7;
    }

    .edit-tip {
      display: none;
      margin-bottom: 14px;
      padding: 12px 14px;
      border-radius: 12px;
      background: #fff8e8;
      border: 1px solid #ffe2a8;
      color: #8a5a00;
      font-size: 14px;
    }

    .edit-tip.show {
      display: block;
    }

    @media (max-width: 960px) {
      header {
        flex-direction: column;
        align-items: flex-start;
      }

      .user-box {
        text-align: left;
      }

      .summary-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .toolbar-top {
        grid-template-columns: 1fr;
      }

      .table-card {
        overflow-x: auto;
      }

      table {
        min-width: 900px;
      }
    }

    @media (max-width: 560px) {
      .summary-grid {
        grid-template-columns: 1fr;
      }

      header {
        padding: 24px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>课题组公共耗材余量看板</h1>
      <p>查看公共耗材剩余量、低库存提醒和补货状态</p>
    </div>

    <div class="user-box">
      <div>当前用户：<strong id="userName"></strong></div>
      <div>学号：<span id="studentId"></span></div>
      <button class="logout-btn" onclick="logout()">退出登录</button>
    </div>
  </header>

  <main>
    <section class="summary-grid">
      <div class="summary-card">
        <span>耗材总种类</span>
        <strong id="totalCount">0</strong>
      </div>

      <div class="summary-card">
        <span>库存充足</span>
        <strong id="okCount">0</strong>
      </div>

      <div class="summary-card">
        <span>低库存 / 缺货</span>
        <strong id="lowCount">0</strong>
      </div>

      <div class="summary-card">
        <span>正在补货</span>
        <strong id="restockingCount">0</strong>
      </div>
    </section>

    <section class="toolbar">
      <div class="toolbar-top">
        <input id="searchInput" class="search-input" type="text" placeholder="搜索耗材名称，例如 DMF、手套、玻璃瓶..." />

        <button id="editBtn" class="btn btn-secondary" onclick="toggleEditMode()">进入维护模式</button>
        <button class="btn btn-primary" onclick="saveInventory()">保存库存</button>
        <button class="btn btn-danger" onclick="resetInventory()">恢复默认</button>
      </div>

      <div class="category-tabs" id="categoryTabs"></div>

      <p class="hint">
        库存状态根据“剩余量”和“最低提醒值”自动判断。维护模式下可以直接修改剩余量、单位和补货状态。
      </p>
    </section>

    <div id="editTip" class="edit-tip">
      当前已进入维护模式：可修改剩余量、单位和是否补货中。修改完成后请点击“保存库存”。
    </div>

    <section class="table-card">
      <table>
        <thead>
          <tr>
            <th>类别</th>
            <th>耗材名称</th>
            <th>剩余量</th>
            <th>单位</th>
            <th>库存状态</th>
            <th>补货状态</th>
          </tr>
        </thead>
        <tbody id="inventoryTable"></tbody>
      </table>
    </section>
  </main>

  <script>
    const SESSION_KEY = "lab_consumable_current_user";
    const INVENTORY_KEY = "lab_consumable_inventory";

    const currentUser = JSON.parse(localStorage.getItem(SESSION_KEY) || "null");

    if (!currentUser) {
      window.location.href = "index.html";
    }

    document.getElementById("userName").textContent = currentUser.name;
    document.getElementById("studentId").textContent = currentUser.studentId;

    const defaultInventory = [
      // 防护类
      { id: "p_mask", category: "防护类", name: "口罩", quantity: 120, unit: "只", min: 30, restocking: false },
      { id: "p_pe_gloves", category: "防护类", name: "PE手套", quantity: 8, unit: "盒", min: 3, restocking: false },
      { id: "p_latex_gloves", category: "防护类", name: "乳胶手套", quantity: 5, unit: "盒", min: 3, restocking: true },
      { id: "p_shoe_cover", category: "防护类", name: "鞋套", quantity: 300, unit: "双", min: 80, restocking: false },

      // 溶剂类
      { id: "s_ethanol_bottle", category: "溶剂类", name: "乙醇(瓶)", quantity: 6, unit: "瓶", min: 3, restocking: false },
      { id: "s_ethanol_barrel", category: "溶剂类", name: "乙醇(桶)", quantity: 2, unit: "桶", min: 1, restocking: false },
      { id: "s_ipa_bottle", category: "溶剂类", name: "异丙醇(瓶)", quantity: 4, unit: "瓶", min: 3, restocking: false },
      { id: "s_ipa_barrel", category: "溶剂类", name: "异丙醇(桶)", quantity: 1, unit: "桶", min: 1, restocking: true },
      { id: "s_octane", category: "溶剂类", name: "正辛烷", quantity: 2, unit: "瓶", min: 1, restocking: false },
      { id: "s_ea", category: "溶剂类", name: "乙酸乙酯", quantity: 3, unit: "瓶", min: 1, restocking: false },
      { id: "s_dmf", category: "溶剂类", name: "DMF", quantity: 2, unit: "瓶", min: 1, restocking: false },
      { id: "s_glass_cleaner", category: "溶剂类", name: "玻璃清洗剂", quantity: 1, unit: "瓶", min: 1, restocking: true },

      // 注射器
      { id: "sy_1ml", category: "注射器", name: "1mL", quantity: 200, unit: "支", min: 50, restocking: false },
      { id: "sy_2ml", category: "注射器", name: "2mL", quantity: 160, unit: "支", min: 50, restocking: false },
      { id: "sy_5ml", category: "注射器", name: "5mL", quantity: 120, unit: "支", min: 40, restocking: false },
      { id: "sy_10ml", category: "注射器", name: "10mL", quantity: 80, unit: "支", min: 30, restocking: false },
      { id: "sy_20ml", category: "注射器", name: "20mL", quantity: 40, unit: "支", min: 20, restocking: false },

      // 容器类
      { id: "c_5ml_glass", category: "容器类", name: "5mL玻璃瓶", quantity: 100, unit: "个", min: 30, restocking: false },
      { id: "c_20ml_glass", category: "容器类", name: "20mL玻璃瓶", quantity: 80, unit: "个", min: 30, restocking: false },
      { id: "c_50ml_glass", category: "容器类", name: "50mL玻璃瓶", quantity: 50, unit: "个", min: 20, restocking: false },
      { id: "c_100ml_glass", category: "容器类", name: "100mL玻璃瓶", quantity: 30, unit: "个", min: 15, restocking: false },
      { id: "c_square_dish", category: "容器类", name: "方型培养皿", quantity: 60, unit: "个", min: 20, restocking: false },
      { id: "c_round_dish", category: "容器类", name: "圆形培养皿", quantity: 70, unit: "个", min: 20, restocking: false },
      { id: "c_10ml_tube", category: "容器类", name: "10mL离心管", quantity: 300, unit: "支", min: 80, restocking: false },
      { id: "c_50ml_tube", category: "容器类", name: "50mL离心管", quantity: 200, unit: "支", min: 60, restocking: false },

      // 其他类
      { id: "o_zip_big", category: "其他类", name: "自封袋(大)", quantity: 100, unit: "个", min: 30, restocking: false },
      { id: "o_zip_mid", category: "其他类", name: "自封袋(中)", quantity: 150, unit: "个", min: 40, restocking: false },
      { id: "o_zip_small", category: "其他类", name: "自封袋(小)", quantity: 180, unit: "个", min: 50, restocking: false },
      { id: "o_foil", category: "其他类", name: "锡纸", quantity: 3, unit: "卷", min: 1, restocking: false },
      { id: "o_cleanroom_wipe", category: "其他类", name: "无尘布", quantity: 6, unit: "包", min: 2, restocking: false },
      { id: "o_lens_paper", category: "其他类", name: "擦镜纸", quantity: 5, unit: "本", min: 2, restocking: false },
      { id: "o_tip_100ul", category: "其他类", name: "移液枪头(100μL)", quantity: 8, unit: "盒", min: 3, restocking: false },
      { id: "o_tip_1ml", category: "其他类", name: "移液枪头(1mL)", quantity: 6, unit: "盒", min: 3, restocking: false },
      { id: "o_tip_5ml", category: "其他类", name: "移液枪头(5mL)", quantity: 3, unit: "盒", min: 2, restocking: true }
    ];

    let inventory = loadInventory();
    let currentCategory = "全部";
    let editMode = false;

    function loadInventory() {
      try {
        const saved = JSON.parse(localStorage.getItem(INVENTORY_KEY));
        return Array.isArray(saved) ? saved : structuredClone(defaultInventory);
      } catch {
        return structuredClone(defaultInventory);
      }
    }

    function saveInventory() {
      localStorage.setItem(INVENTORY_KEY, JSON.stringify(inventory));
      alert("库存数据已保存。");
      render();
    }

    function resetInventory() {
      const ok = confirm("确定要恢复默认库存数据吗？这会覆盖当前修改。");
      if (!ok) return;

      inventory = structuredClone(defaultInventory);
      localStorage.setItem(INVENTORY_KEY, JSON.stringify(inventory));
      render();
    }

    function logout() {
      localStorage.removeItem(SESSION_KEY);
      window.location.href = "index.html";
    }

    function toggleEditMode() {
      editMode = !editMode;

      document.getElementById("editBtn").textContent = editMode ? "退出维护模式" : "进入维护模式";
      document.getElementById("editTip").classList.toggle("show", editMode);

      renderTable();
    }

    function getStatus(item) {
      if (Number(item.quantity) <= 0) {
        return {
          text: "缺货",
          className: "badge-empty"
        };
      }

      if (Number(item.quantity) <= Number(item.min)) {
        return {
          text: "低库存",
          className: "badge-low"
        };
      }

      return {
        text: "充足",
        className: "badge-ok"
      };
    }

    function getFilteredInventory() {
      const keyword = document.getElementById("searchInput").value.trim().toLowerCase();

      return inventory.filter(item => {
        const matchCategory = currentCategory === "全部" || item.category === currentCategory;
        const matchKeyword =
          !keyword ||
          item.name.toLowerCase().includes(keyword) ||
          item.category.toLowerCase().includes(keyword);

        return matchCategory && matchKeyword;
      });
    }

    function renderSummary() {
      const total = inventory.length;
      const low = inventory.filter(item => Number(item.quantity) <= Number(item.min)).length;
      const restocking = inventory.filter(item => item.restocking).length;
      const ok = total - low;

      document.getElementById("totalCount").textContent = total;
      document.getElementById("okCount").textContent = ok;
      document.getElementById("lowCount").textContent = low;
      document.getElementById("restockingCount").textContent = restocking;
    }

    function renderCategoryTabs() {
      const categories = ["全部", ...new Set(inventory.map(item => item.category))];
      const wrap = document.getElementById("categoryTabs");

      wrap.innerHTML = categories.map(cat => `
        <button class="cat-btn ${cat === currentCategory ? "active" : ""}" onclick="setCategory('${cat}')">
          ${cat}
        </button>
      `).join("");
    }

    function setCategory(category) {
      currentCategory = category;
      render();
    }

    function updateQuantity(id, value) {
      const item = inventory.find(i => i.id === id);
      if (!item) return;

      const number = Number(value);
      item.quantity = Number.isFinite(number) && number >= 0 ? number : 0;
      renderSummary();
    }

    function updateUnit(id, value) {
      const item = inventory.find(i => i.id === id);
      if (!item) return;

      item.unit = value.trim() || "件";
    }

    function updateRestocking(id, checked) {
      const item = inventory.find(i => i.id === id);
      if (!item) return;

      item.restocking = checked;
      renderSummary();
    }

    function renderTable() {
      const tbody = document.getElementById("inventoryTable");
      const list = getFilteredInventory();

      if (list.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="6" class="empty">没有找到匹配的耗材。</td>
          </tr>
        `;
        return;
      }

      tbody.innerHTML = list.map(item => {
        const status = getStatus(item);

        const quantityCell = editMode
          ? `<input class="qty-input" type="number" min="0" value="${item.quantity}" onchange="updateQuantity('${item.id}', this.value)" />`
          : `<strong>${item.quantity}</strong>`;

        const unitCell = editMode
          ? `<input class="unit-input" type="text" value="${item.unit}" onchange="updateUnit('${item.id}', this.value)" />`
          : item.unit;

        const restockingCell = editMode
          ? `<input class="checkbox" type="checkbox" ${item.restocking ? "checked" : ""} onchange="updateRestocking('${item.id}', this.checked)" />`
          : item.restocking
            ? `<span class="badge badge-restocking">补货中</span>`
            : `<span class="badge badge-normal">未补货</span>`;

        return `
          <tr>
            <td><span class="category-label">${item.category}</span></td>
            <td><span class="item-name">${item.name}</span></td>
            <td>${quantityCell}</td>
            <td>${unitCell}</td>
            <td><span class="badge ${status.className}">${status.text}</span></td>
            <td>${restockingCell}</td>
          </tr>
        `;
      }).join("");
    }

    function render() {
      renderSummary();
      renderCategoryTabs();
      renderTable();
    }

    document.getElementById("searchInput").addEventListener("input", renderTable);

    render();
  </script>
</body>
</html>
