<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>B504仓库</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Microsoft YaHei", Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 15% 10%, rgba(64, 145, 255, 0.16), transparent 28%),
        radial-gradient(circle at 85% 80%, rgba(255, 80, 80, 0.08), transparent 28%),
        #f5f8fc;
      color: #1f2d3d;
    }

    .page {
      width: min(1220px, 94vw);
      margin: 0 auto;
      padding: 34px 0 46px;
    }

    .top {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 34px;
      line-height: 1.2;
      color: #0f3d66;
      letter-spacing: 1px;
    }

    .home {
      text-decoration: none;
      color: #4d6b84;
      background: rgba(255, 255, 255, 0.76);
      border: 1px solid rgba(170, 200, 230, 0.72);
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 14px;
      box-shadow: 0 10px 24px rgba(40, 90, 140, 0.08);
    }

    .section {
      margin-bottom: 26px;
    }

    .section-title {
      font-size: 20px;
      color: #123b5f;
      margin-bottom: 13px;
      padding-left: 12px;
      border-left: 5px solid #1b75bc;
      line-height: 1.2;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
      gap: 14px;
    }

    .item {
      min-height: 132px;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(214, 228, 242, 0.95);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 10px 26px rgba(30, 90, 150, 0.08);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: 0.2s ease;
    }

    .item:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 34px rgba(30, 90, 150, 0.12);
    }

    .item.buying {
      border-color: rgba(220, 50, 50, 0.55);
      background: linear-gradient(180deg, rgba(255,255,255,0.94), rgba(255,240,240,0.92));
    }

    .name-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
    }

    .name {
      font-size: 17px;
      font-weight: 700;
      color: #20384f;
      line-height: 1.35;
    }

    .tag-buying {
      display: none;
      flex-shrink: 0;
      padding: 4px 8px;
      border-radius: 999px;
      background: #e53935;
      color: #fff;
      font-size: 12px;
      line-height: 1;
      white-space: nowrap;
    }

    .item.buying .tag-buying {
      display: inline-flex;
    }

    .qty {
      font-size: 28px;
      font-weight: 800;
      color: #0f4c81;
      letter-spacing: 0.5px;
      margin-bottom: 14px;
    }

    .qty small {
      font-size: 15px;
      font-weight: 600;
      color: #6a7f93;
      margin-left: 3px;
    }

    .urge-btn {
      width: 100%;
      height: 38px;
      border: none;
      border-radius: 12px;
      background: #edf5fc;
      color: #0f4c81;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
      border: 1px solid #d8e7f4;
    }

    .urge-btn:hover {
      background: #dceefc;
      transform: translateY(-1px);
    }

    .item.buying .urge-btn {
      background: #e53935;
      color: white;
      border-color: #e53935;
      box-shadow: 0 10px 22px rgba(229, 57, 53, 0.22);
    }

    .item.buying .urge-btn:hover {
      background: #d92d2a;
    }

    @media (max-width: 640px) {
      .page {
        width: min(94vw, 520px);
        padding-top: 26px;
      }

      .top {
        align-items: flex-start;
        flex-direction: column;
      }

      h1 {
        font-size: 30px;
      }

      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .item {
        min-height: 128px;
        padding: 14px;
      }

      .name {
        font-size: 15px;
      }

      .qty {
        font-size: 24px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="top">
      <h1>B504仓库</h1>
      <a class="home" href="index.html">返回首页</a>
    </div>

    <div id="inventory"></div>
  </main>

  <script>
    const INVENTORY_KEY = "lab_consumable_inventory_minimal";

    const defaultInventory = [
      { id: "p_mask", category: "防护类", name: "口罩", quantity: 120, unit: "只", restocking: false },
      { id: "p_pe_gloves", category: "防护类", name: "PE手套", quantity: 8, unit: "盒", restocking: false },
      { id: "p_latex_gloves", category: "防护类", name: "乳胶手套", quantity: 5, unit: "盒", restocking: false },
      { id: "p_shoe_cover", category: "防护类", name: "鞋套", quantity: 300, unit: "双", restocking: false },

      { id: "s_ethanol_bottle", category: "溶剂类", name: "乙醇(瓶)", quantity: 6, unit: "瓶", restocking: false },
      { id: "s_ethanol_barrel", category: "溶剂类", name: "乙醇(桶)", quantity: 2, unit: "桶", restocking: false },
      { id: "s_ipa_bottle", category: "溶剂类", name: "异丙醇(瓶)", quantity: 4, unit: "瓶", restocking: false },
      { id: "s_ipa_barrel", category: "溶剂类", name: "异丙醇(桶)", quantity: 1, unit: "桶", restocking: false },
      { id: "s_octane", category: "溶剂类", name: "正辛烷", quantity: 2, unit: "瓶", restocking: false },
      { id: "s_ea", category: "溶剂类", name: "乙酸乙酯", quantity: 3, unit: "瓶", restocking: false },
      { id: "s_dmf", category: "溶剂类", name: "DMF", quantity: 2, unit: "瓶", restocking: false },
      { id: "s_glass_cleaner", category: "溶剂类", name: "玻璃清洗剂", quantity: 1, unit: "瓶", restocking: false },

      { id: "sy_1ml", category: "注射器", name: "1mL", quantity: 200, unit: "支", restocking: false },
      { id: "sy_2ml", category: "注射器", name: "2mL", quantity: 160, unit: "支", restocking: false },
      { id: "sy_5ml", category: "注射器", name: "5mL", quantity: 120, unit: "支", restocking: false },
      { id: "sy_10ml", category: "注射器", name: "10mL", quantity: 80, unit: "支", restocking: false },
      { id: "sy_20ml", category: "注射器", name: "20mL", quantity: 40, unit: "支", restocking: false },

      { id: "c_5ml_glass", category: "容器类", name: "5mL玻璃瓶", quantity: 100, unit: "个", restocking: false },
      { id: "c_20ml_glass", category: "容器类", name: "20mL玻璃瓶", quantity: 80, unit: "个", restocking: false },
      { id: "c_50ml_glass", category: "容器类", name: "50mL玻璃瓶", quantity: 50, unit: "个", restocking: false },
      { id: "c_100ml_glass", category: "容器类", name: "100mL玻璃瓶", quantity: 30, unit: "个", restocking: false },
      { id: "c_square_dish", category: "容器类", name: "方型培养皿", quantity: 60, unit: "个", restocking: false },
      { id: "c_round_dish", category: "容器类", name: "圆形培养皿", quantity: 70, unit: "个", restocking: false },
      { id: "c_10ml_tube", category: "容器类", name: "10mL离心管", quantity: 300, unit: "支", restocking: false },
      { id: "c_50ml_tube", category: "容器类", name: "50mL离心管", quantity: 200, unit: "支", restocking: false },

      { id: "o_zip_big", category: "其他类", name: "自封袋(大)", quantity: 100, unit: "个", restocking: false },
      { id: "o_zip_mid", category: "其他类", name: "自封袋(中)", quantity: 150, unit: "个", restocking: false },
      { id: "o_zip_small", category: "其他类", name: "自封袋(小)", quantity: 180, unit: "个", restocking: false },
      { id: "o_foil", category: "其他类", name: "锡纸", quantity: 3, unit: "卷", restocking: false },
      { id: "o_cleanroom_wipe", category: "其他类", name: "无尘布", quantity: 6, unit: "包", restocking: false },
      { id: "o_lens_paper", category: "其他类", name: "擦镜纸", quantity: 5, unit: "本", restocking: false },
      { id: "o_tip_100ul", category: "其他类", name: "移液枪头(100μL)", quantity: 8, unit: "盒", restocking: false },
      { id: "o_tip_1ml", category: "其他类", name: "移液枪头(1mL)", quantity: 6, unit: "盒", restocking: false },
      { id: "o_tip_5ml", category: "其他类", name: "移液枪头(5mL)", quantity: 3, unit: "盒", restocking: false }
    ];

    let inventory = loadInventory();

    function loadInventory() {
      try {
        const saved = JSON.parse(localStorage.getItem(INVENTORY_KEY));
        if (!Array.isArray(saved)) return structuredClone(defaultInventory);

        const savedMap = new Map(saved.map(item => [item.id, item]));

        return defaultInventory.map(item => ({
          ...item,
          ...(savedMap.get(item.id) || {})
        }));
      } catch {
        return structuredClone(defaultInventory);
      }
    }

    function saveInventory() {
      localStorage.setItem(INVENTORY_KEY, JSON.stringify(inventory));
    }

    function urgeOrder(id) {
      const item = inventory.find(item => item.id === id);
      if (!item) return;

      item.restocking = true;
      saveInventory();
      render();
    }

    function render() {
      const container = document.getElementById("inventory");
      const categories = [...new Set(inventory.map(item => item.category))];

      container.innerHTML = categories.map(category => {
        const items = inventory.filter(item => item.category === category);

        return `
          <section class="section">
            <h2 class="section-title">${category}</h2>
            <div class="grid">
              ${items.map(item => `
                <div class="item ${item.restocking ? "buying" : ""}">
                  <div>
                    <div class="name-row">
                      <div class="name">${item.name}</div>
                      <span class="tag-buying">采购中</span>
                    </div>
                    <div class="qty">${item.quantity}<small>${item.unit}</small></div>
                  </div>
                  <button class="urge-btn" onclick="urgeOrder('${item.id}')">
                    ${item.restocking ? "采购中" : "催货"}
                  </button>
                </div>
              `).join("")}
            </div>
          </section>
        `;
      }).join("");
    }

    render();
  </script>
</body>
</html>
