<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>课题组公共耗材管理系统</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft YaHei", Arial, sans-serif;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    body {
      min-height: 100vh;
      background-image: url("./back.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      overflow: hidden;
      position: relative;
    }

    /* 背景轻微压暗，让按钮更突出 */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 20, 45, 0.18);
      z-index: 0;
    }

    .enter-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

.enter-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 220px;
  height: 62px;
  padding: 0 42px;
  border-radius: 999px;
  text-decoration: none;
  font-size: 22px;
  font-weight: 600;
  letter-spacing: 2px;
  color: #ffffff;

  /* 更透明的玻璃按钮 */
  background: rgba(255, 255, 255, 0.16);
  border: 1px solid rgba(255, 255, 255, 0.72);

  box-shadow:
    0 18px 42px rgba(0, 35, 80, 0.28),
    inset 0 0 22px rgba(255, 255, 255, 0.22),
    inset 0 1px 0 rgba(255, 255, 255, 0.65);

  backdrop-filter: blur(18px) saturate(160%);
  -webkit-backdrop-filter: blur(18px) saturate(160%);

  transition: all 0.25s ease;
}

.enter-btn:hover {
  transform: translateY(-3px) scale(1.03);

  background: rgba(255, 255, 255, 0.24);
  border-color: rgba(255, 255, 255, 0.92);

  box-shadow:
    0 24px 55px rgba(0, 60, 120, 0.34),
    0 0 26px rgba(120, 210, 255, 0.48),
    inset 0 0 26px rgba(255, 255, 255, 0.28),
    inset 0 1px 0 rgba(255, 255, 255, 0.8);
}

    .enter-btn:active {
      transform: translateY(-1px) scale(0.99);
    }


    .main-title {
      position: absolute;
      z-index: 1;
      top: 8%;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      text-align: center;
      font-size: clamp(42px, 7vw, 88px);
      font-weight: 800;
      letter-spacing: 6px;
      color: rgba(255, 255, 255, 0.96);
      text-shadow:
        0 6px 24px rgba(0, 20, 50, 0.45),
        0 0 22px rgba(110, 210, 255, 0.34);
      user-select: none;
    }

    .admin-info {
      position: absolute;
      z-index: 1;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 15px;
      letter-spacing: 1px;
      color: rgba(255, 255, 255, 0.78);
      text-shadow: 0 3px 12px rgba(0, 20, 45, 0.45);
      user-select: none;
    }

    @media (max-width: 600px) {
      .main-title {
        top: 9%;
        font-size: 40px;
        letter-spacing: 3px;
      }

      .admin-info {
        bottom: 18px;
        font-size: 13px;
      }

      .enter-btn {
        min-width: 180px;
        height: 56px;
        font-size: 19px;
        padding: 0 34px;
      }
    }
  </style>
</head>

<body>
  <h1 class="main-title">B504仓库在线</h1>

  <div class="enter-wrap">
    <a class="enter-btn" href="inventory.html">进入系统</a>
  </div>

  <div class="admin-info">管理员QQ：1744996809</div>
</body>
</html>
